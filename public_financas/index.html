<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JucaFinanças - Controle Pessoal</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JucaFinanças 💰</h1>
            <p>Controle Financeiro Pessoal</p>
        </header>

        <section class="summary-grid">
            <div class="glass-card summary-item">
                <h3>Saldo Total</h3>
                <p id="total-balance" class="amount balance">R$ 0,00</p>
            </div>
            <div class="glass-card summary-item">
                <h3>Receitas</h3>
                <p id="total-income" class="amount income">R$ 0,00</p>
            </div>
            <div class="glass-card summary-item">
                <h3>Despesas</h3>
                <p id="total-expense" class="amount expense">R$ 0,00</p>
            </div>
        </section>

        <div class="main-grid">
            <section class="glass-card">
                <h3>Nova Transação</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" id="desc" placeholder="Ex: Salário, Aluguel..." required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="category">
                            <option value="Receita">Receita</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Moradia">Moradia</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Saúde">Saúde</option>
                            <option value="Educação">Educação</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <button type="submit">Adicionar Transação</button>
                </form>
            </section>

            <section class="glass-card history-section">
                <h3>Histórico</h3>
                <div id="transaction-list" class="transaction-list">
                    <!-- Transações serão inseridas aqui -->
                </div>
            </section>
        </div>

        <footer style="margin-top: 3rem; text-align: center; padding-bottom: 2rem;">
            <p style="color: #64748b; font-size: 0.8rem;">JucaFinanças &copy; 2026</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
